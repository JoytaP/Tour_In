<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Criar Conta — Tour.In</title>
  <link rel="stylesheet" href="../assets/css/style.css">
  <style>
    /* Reset e Centralização */
    body { 
        margin: 0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        background: var(--bg-dark);
        overflow-x: hidden;
        font-family: 'Inter', sans-serif;
    }

    /* Box de Registro com Efeito de Vidro */
    .auth-container {
        width: 100%;
        max-width: 480px; /* Um pouco mais largo para acomodar o form-row */
        padding: 40px;
        background: rgba(255, 255, 255, 0.03);
        backdrop-filter: blur(25px);
        -webkit-backdrop-filter: blur(25px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 35px;
        box-shadow: 0 25px 50px rgba(0, 0, 0, 0.5);
        animation: registerEntrance 0.7s cubic-bezier(0.23, 1, 0.32, 1) both;
    }

    @keyframes registerEntrance {
        from { opacity: 0; transform: translateY(30px); }
        to { opacity: 1; transform: translateY(0); }
    }

    .login-header {
        text-align: center;
        margin-bottom: 30px;
    }

    .logo-box {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 12px;
        margin-bottom: 15px;
        text-decoration: none;
    }

    .logo-mark {
        width: 38px;
        height: 38px;
        background: var(--accent-primary);
        border-radius: 10px;
        color: #000;
        display: flex; align-items: center; justify-content: center;
        font-weight: 900;
        box-shadow: 0 0 20px rgba(0, 242, 255, 0.3);
    }

    .logo-text {
        font-size: 1.5rem;
        font-weight: 800;
        color: white;
    }

    /* Inputs e Labels */
    .form-group { margin-bottom: 18px; }
    
    .label-subtle {
        font-size: 0.75rem;
        color: var(--text-muted);
        margin-left: 5px;
        margin-bottom: 5px;
        display: block;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    .input-auth {
        width: 100%;
        background: rgba(255, 255, 255, 0.05) !important;
        border: 1px solid rgba(255, 255, 255, 0.1) !important;
        border-radius: 14px !important;
        color: white !important;
        padding: 12px 16px !important;
        font-size: 0.9rem;
        transition: var(--transition-smooth);
    }

    .input-auth:focus {
        border-color: var(--accent-primary) !important;
        background: rgba(255, 255, 255, 0.08) !important;
        outline: none;
    }

    /* Grid para Senha e Confirmar */
    .form-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 15px;
    }

    .btn-register {
        width: 100%;
        padding: 14px;
        font-size: 1rem;
        margin-top: 10px;
    }

    .divider-text {
        text-align: center;
        color: var(--text-muted);
        font-size: 0.8rem;
        margin: 20px 0;
        position: relative;
    }

    .footer-links {
        text-align: center;
        font-size: 0.85rem;
        color: var(--text-muted);
    }

    .footer-links a {
        color: var(--accent-primary);
        text-decoration: none;
        font-weight: 600;
    }

    .terms-text {
        font-size: 0.7rem;
        color: #666;
        text-align: center;
        margin-top: 25px;
        line-height: 1.4;
    }

    #msg {
        color: #ff4d4d;
        text-align: center;
        font-size: 0.8rem;
        min-height: 20px;
    }

    @media(max-width: 500px) {
        .auth-container { margin: 15px; padding: 25px; }
        .form-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <div class="auth-container">
    <div class="login-header">
      <a href="../index.html" class="logo-box">
        <div class="logo-mark">T</div>
        <span class="logo-text">Tour.In</span>
      </a>
      <h1 style="font-size: 1.5rem; color: #fff; margin-bottom: 5px;">Crie sua conta</h1>
      <p style="color: var(--text-muted); font-size: 0.9rem;">Junte-se à maior rede de exploração urbana.</p>
    </div>

    <form id="register-form">
      <div class="form-group">
        <label class="label-subtle">Nome Completo</label>
        <input type="text" class="input-auth" id="reg-name" placeholder="Ex: João Silva" required>
      </div>

      <div class="form-group">
        <label class="label-subtle">E-mail</label>
        <input type="email" class="input-auth" id="reg-email" placeholder="seu@email.com" required>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label class="label-subtle">Senha</label>
          <input type="password" class="input-auth" id="reg-password" placeholder="••••••••" required>
        </div>
        <div class="form-group">
          <label class="label-subtle">Confirmar</label>
          <input type="password" class="input-auth" id="reg-confirm-password" placeholder="••••••••" required>
        </div>
      </div>

      <div id="msg"></div>

      <button type="button" id="btn-register" class="btn btn-primary btn-register">Criar conta grátis</button>
    </form>

    <div class="divider-text">ou</div>

    <div class="footer-links">
      Já tem uma conta? <a href="login.html">Fazer Login</a>
    </div>

    <p class="terms-text">
      Ao se registrar, você aceita nossos <a href="#" style="color: #888;">Termos de Serviço</a> 
      e <a href="#" style="color: #888;">Política de Privacidade</a>.
    </p>
  </div>

  <script src="../assets/js/main.js"></script>
  <script src="../assets/js/auth.js"></script>
</body>
</html>
