<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Meu Perfil — Tour.In</title>
  <link rel="stylesheet" href="../assets/css/style.css">
  <style>
    /* Ajustes de Layout para alinhar com o estilo Global */
    body {
        padding-top: 100px; /* Espaço para a nav pílula */
        overflow-x: hidden;
    }

    .profile-layout {
        display: grid;
        grid-template-columns: 320px 1fr;
        gap: 30px;
        align-items: start;
        padding: 40px 20px;
        max-width: 1200px;
        margin: 0 auto;
    }

    /* Estilo Vidro (Glassmorphism) nos Cards */
    .profile-sidebar .glass-card, 
    .profile-form .glass-card {
        background: rgba(255, 255, 255, 0.03);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid var(--glass-border);
        border-radius: 32px;
        padding: 40px 30px;
        box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
        animation: fadeUp 0.6s cubic-bezier(0.23, 1, 0.32, 1) both;
    }

    @keyframes fadeUp {
        from { opacity: 0; transform: translateY(30px); }
        to { opacity: 1; transform: translateY(0); }
    }

    /* Avatar Neon */
    .avatar-lg {
        width: 110px;
        height: 110px;
        border-radius: 30px; /* Formato 'squircle' moderno */
        margin: 0 auto 25px;
        background: linear-gradient(135deg, var(--accent-primary), var(--accent-secondary));
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 900;
        color: #000;
        font-size: 2.5rem;
        box-shadow: 0 10px 25px rgba(0, 242, 255, 0.3);
    }

    .profile-name {
        font-size: 1.5rem;
        font-weight: 800;
        color: #fff;
        margin-bottom: 5px;
    }

    .profile-meta {
        margin-top: 30px;
        border-top: 1px solid var(--glass-border);
        padding-top: 20px;
    }

    .meta-row {
        display: flex;
        justify-content: space-between;
        padding: 12px 0;
        border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        font-size: 0.9rem;
    }

    .meta-row span:first-child { color: var(--text-muted); font-weight: 500; }
    .meta-row span:last-child { color: #fff; font-weight: 700; }

    /* Estilização das Seções do Formulário */
    .section-sep {
        display: flex;
        align-items: center;
        gap: 15px;
        margin: 35px 0 20px;
        color: var(--accent-primary);
        font-size: 0.75rem;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 2px;
    }

    .section-sep::after {
        content: '';
        flex: 1;
        height: 1px;
        background: var(--glass-border);
    }

    /* Preferências (Chips) */
    .prefs-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
        gap: 12px;
    }

    .pref-chip {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid var(--glass-border);
        border-radius: 15px;
        padding: 12px;
        text-align: center;
        cursor: pointer;
        transition: var(--transition-smooth);
        font-size: 0.85rem;
        color: var(--text-muted);
    }

    .pref-chip input { display: none; }

    .pref-chip:hover {
        background: rgba(255, 255, 255, 0.1);
        border-color: var(--accent-primary);
        color: #fff;
    }

    .pref-chip:has(input:checked) {
        background: var(--accent-primary);
        color: #000;
        font-weight: 700;
        box-shadow: 0 0 15px rgba(0, 242, 255, 0.4);
    }

    /* Inputs e Textarea */
    .input, .textarea {
        width: 100%;
        background: rgba(255, 255, 255, 0.05) !important;
        border: 1px solid var(--glass-border) !important;
        border-radius: 14px !important;
        color: #fff !important;
        padding: 12px 15px !important;
        margin-top: 8px;
    }

    .textarea { min-height: 100px; resize: vertical; }

    .form-row2 {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
    }

    .form-actions {
        display: flex;
        gap: 15px;
        margin-top: 30px;
    }

    @media(max-width: 900px) {
        .profile-layout { grid-template-columns: 1fr; }
        .profile-sidebar { order: -1; }
    }
  </style>
</head>
<body>

<div class="container">
  <header>
    <div class="logo">
        <a href="../index.html" style="text-decoration:none;">
            <img src="../assets/img/logo.png" alt="Tour-In">
        </a>
    </div>
    <ul class="nav-links" id="main-nav">
        <li><a href="explore.html">Explorar</a></li>
        <li><a href="events.html">Eventos</a></li>
        <li><a href="dashboard.html">Home</a></li>
        <li><a href="profile.html" class="active">Perfil</a></li>
        <li><a href="#" id="logout-btn" style="color: #ff4d4d;">Sair</a></li>
    </ul>
  </header>

  <div class="profile-layout">
    <aside class="profile-sidebar">
      <div class="glass-card">
        <div class="avatar-lg" id="profile-initials">U</div>
        <div class="profile-name" id="display-name">Carregando...</div>
        <p style="color: var(--text-muted); font-size: 0.9rem;" id="display-email">email@carregando.com</p>
        
        <div class="profile-meta">
          <div class="meta-row"><span>Membro desde</span><span id="join-date">—</span></div>
          <div class="meta-row"><span>Avaliações</span><span id="review-count">0</span></div>
          <div class="meta-row"><span>Roteiros</span><span id="itinerary-count">0</span></div>
        </div>
      </div>
    </aside>

    <main class="profile-form">
      <div class="glass-card">
        <h2 style="font-weight: 800; letter-spacing: -1px;">Editar Perfil</h2>
        
        <form id="profile-edit-form">
          <p class="section-sep">Informações pessoais</p>
          
          <div class="form-group">
            <label class="label" style="font-size: 0.8rem; color: var(--text-muted);">Nome Completo</label>
            <input type="text" class="input" id="edit-name" placeholder="Teu nome aqui" required>
          </div>

          <div class="form-row2" style="margin-top: 15px;">
            <div class="form-group">
              <label class="label" style="font-size: 0.8rem; color: var(--text-muted);">Cidade</label>
              <input type="text" class="input" id="edit-city" placeholder="Ex: São Paulo">
            </div>
            <div class="form-group">
              <label class="label" style="font-size: 0.8rem; color: var(--text-muted);">Telefone</label>
              <input type="tel" class="input" id="edit-phone" placeholder="(XX) 99999-9999">
            </div>
          </div>

          <div class="form-group" style="margin-top: 15px;">
            <label class="label" style="font-size: 0.8rem; color: var(--text-muted);">Biografia</label>
            <textarea class="textarea" id="edit-bio" placeholder="Conta-nos um pouco sobre as tuas aventuras..."></textarea>
          </div>

          <p class="section-sep">Preferências de Viagem</p>
          
          <div class="prefs-grid">
            <label class="pref-chip"><input type="checkbox" name="pref" value="gastronomy"> 🍽️ Gastronomia</label>
            <label class="pref-chip"><input type="checkbox" name="pref" value="nightlife"> 🎉 Noite</label>
            <label class="pref-chip"><input type="checkbox" name="pref" value="culture"> 🎭 Cultura</label>
            <label class="pref-chip"><input type="checkbox" name="pref" value="nature"> 🌳 Natureza</label>
          </div>

          <div class="form-actions">
            <button type="submit" class="btn btn-primary" style="flex: 2;">Salvar Alterações</button>
            <button type="button" class="btn" style="flex: 1; background: rgba(255,255,255,0.05); color: #fff;">Cancelar</button>
          </div>
        </form>
      </div>
    </main>
  </div>
</div>

<script src="../assets/js/main.js"></script>
<script src="../assets/js/profile.js"></script>
</body>
</html>
