<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Painel Business — Tour.In</title>
  <link rel="stylesheet" href="../assets/css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    body { padding-top: 100px; overflow-x: hidden; }
    main { max-width: 1200px; margin: 0 auto; padding: 20px; }

    .business-header { margin-bottom: 40px; animation: fadeUp 0.6s cubic-bezier(0.23, 1, 0.32, 1) both; }

    .bento-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-auto-rows: minmax(160px, auto);
      gap: 20px;
      animation: fadeUp 0.8s cubic-bezier(0.23, 1, 0.32, 1) both;
    }

    .glass-card {
      background: rgba(255,255,255,0.03);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--glass-border);
      border-radius: 28px;
      padding: 30px;
      transition: var(--transition-smooth);
    }

    .stat-card { text-align: center; display: flex; flex-direction: column; justify-content: center; }
    .stat-number {
      font-size: 3rem; font-weight: 900;
      background: linear-gradient(to bottom, #fff, var(--accent-primary));
      -webkit-background-clip: text; color: transparent; -webkit-text-fill-color: transparent;
      line-height: 1; margin-bottom: 8px;
    }

    .events-management { grid-column: span 3; grid-row: span 2; }

    .event-item-mini {
      display: flex; justify-content: space-between; align-items: center;
      padding: 15px; background: rgba(255,255,255,0.05); border-radius: 18px;
      margin-bottom: 12px; border: 1px solid transparent; transition: 0.3s;
    }
    .event-item-mini:hover { border-color: var(--accent-primary); background: rgba(255,255,255,0.08); }

    .quick-actions { grid-column: span 1; grid-row: span 2; display: flex; flex-direction: column; gap: 12px; }

    .action-btn {
      display: flex; align-items: center; gap: 12px; width: 100%;
      padding: 18px; background: rgba(255,255,255,0.05);
      border: 1px solid var(--glass-border); border-radius: 20px;
      color: #fff; text-decoration: none; font-weight: 700;
      font-size: 0.9rem; transition: var(--transition-smooth); cursor: pointer;
    }
    .action-btn:hover { background: var(--accent-primary); color: #000; transform: translateY(-3px); border-color: var(--accent-primary); }

    .badge-status { font-size: 0.7rem; padding: 4px 10px; border-radius: 100px; font-weight: 800; text-transform: uppercase; }
    .status-active { background: rgba(0,242,255,0.1); color: var(--accent-primary); }
    .status-past   { background: rgba(255,255,255,0.08); color: var(--text-muted); }

    .delete-btn {
      background: none; border: none; color: #ff4d4d; cursor: pointer;
      font-size: 1rem; padding: 4px 8px; border-radius: 8px;
      transition: background 0.2s; margin-left: 8px;
    }
    .delete-btn:hover { background: rgba(255,77,77,0.15); }

    /* ── MODAL ── */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.7); backdrop-filter: blur(6px);
      z-index: 999; align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }

    .modal-box {
      background: #111; border: 1px solid var(--glass-border);
      border-radius: 28px; padding: 36px; width: 100%; max-width: 520px;
      animation: fadeUp 0.3s ease both;
    }
    .modal-box h2 { margin-bottom: 24px; font-weight: 800; }

    .form-group { margin-bottom: 18px; }
    .form-group label { display: block; margin-bottom: 6px; font-size: 0.8rem; color: var(--text-muted); font-weight: 600; text-transform: uppercase; }
    .form-group input,
    .form-group select,
    .form-group textarea {
      width: 100%; padding: 12px 16px; background: rgba(255,255,255,0.06);
      border: 1px solid var(--glass-border); border-radius: 14px;
      color: #fff; font-size: 0.95rem; font-family: inherit;
      transition: border-color 0.2s;
    }
    .form-group input:focus,
    .form-group select:focus,
    .form-group textarea:focus { outline: none; border-color: var(--accent-primary); }
    .form-group textarea { resize: vertical; min-height: 80px; }
    .form-group select option { background: #111; color: #fff; }

    .modal-actions { display: flex; gap: 12px; margin-top: 8px; }
    .modal-actions button { flex: 1; }
    .btn-cancel { background: rgba(255,255,255,0.06); border: 1px solid var(--glass-border); color: #fff; padding: 14px; border-radius: 14px; font-weight: 700; cursor: pointer; transition: 0.2s; }
    .btn-cancel:hover { background: rgba(255,255,255,0.12); }

    /* ── MODAL EDIÇÃO ── */
    #edit-modal .modal-box { max-width: 560px; }

    /* ── EMPTY STATE ── */
    .empty-state { text-align: center; padding: 40px 20px; color: var(--text-muted); }
    .empty-state span { font-size: 2.5rem; display: block; margin-bottom: 12px; }

    @media (max-width: 1024px) {
      .bento-grid { grid-template-columns: repeat(2,1fr); }
      .events-management { grid-column: span 2; }
    }
    @media (max-width: 650px) {
      .bento-grid { grid-template-columns: 1fr; }
      .events-management, .quick-actions { grid-column: span 1; }
    }
  </style>
</head>
<body>

  <header>
    <div class="logo">
      <a href="../index.html" style="display:flex;align-items:center;gap:10px;text-decoration:none;">
        <div style="width:30px;height:30px;background:var(--accent-primary);border-radius:8px;color:#000;display:flex;align-items:center;justify-content:center;font-weight:900;">T</div>
        <span style="color:#fff;font-weight:800;">Tour.In <small style="opacity:.6;">Biz</small></span>
      </a>
    </div>
    <ul class="nav-links">
      <li><a href="#" class="active">Painel</a></li>
      <li><a href="#" id="edit-profile-link">Editar Perfil</a></li>
      <li><a href="#" id="logout-btn" style="color:#ff4d4d;">Sair</a></li>
    </ul>
  </header>

  <main>
    <section class="business-header">
      <h1 style="font-weight:800;">Olá, <span id="company-name" style="color:var(--accent-primary);">Carregando...</span></h1>
      <p style="color:var(--text-muted);">Gerencie sua visibilidade e eventos aqui.</p>
    </section>

    <div class="bento-grid">

      <div class="glass-card stat-card">
        <div class="stat-number" id="stat-events">0</div>
        <p style="color:var(--text-muted);font-size:.75rem;font-weight:800;text-transform:uppercase;">Eventos Criados</p>
      </div>

      <div class="glass-card stat-card">
        <div class="stat-number" id="stat-upcoming">0</div>
        <p style="color:var(--text-muted);font-size:.75rem;font-weight:800;text-transform:uppercase;">Próximos Eventos</p>
      </div>

      <div class="glass-card stat-card">
        <div class="stat-number" id="stat-category" style="font-size:1.2rem;-webkit-text-fill-color:#fff;">—</div>
        <p style="color:var(--text-muted);font-size:.75rem;font-weight:800;text-transform:uppercase;">Categoria</p>
      </div>

      <div class="glass-card stat-card" style="border-color:var(--accent-secondary);background:rgba(112,0,255,0.05);">
        <div class="stat-number" style="font-size:1.5rem;color:#fff;-webkit-text-fill-color:#fff;">Ativo</div>
        <p style="color:var(--text-muted);font-size:.7rem;">STATUS DA CONTA</p>
      </div>

      <!-- Gestão de Eventos -->
      <div class="glass-card events-management">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:25px;">
          <h3 style="font-weight:700;">Meus Eventos</h3>
          <button id="new-event-btn" class="btn btn-primary" style="font-size:.75rem;padding:8px 15px;color:#000;border:none;cursor:pointer;">+ Novo Evento</button>
        </div>
        <div id="events-list">
          <div class="empty-state"><span>📅</span>Nenhum evento ainda. Crie o primeiro!</div>
        </div>
      </div>

      <!-- Ações Rápidas -->
      <div class="quick-actions glass-card" style="padding:24px;">
        <p style="font-size:.7rem;font-weight:800;text-transform:uppercase;color:var(--text-muted);margin-bottom:4px;">Ações Rápidas</p>
        <button class="action-btn" id="edit-profile-btn"><span>📝</span> Editar Perfil</button>
        <button class="action-btn" id="new-event-btn-2"><span>🗓️</span> Criar Evento</button>
        <button class="action-btn" id="copy-link-btn"><span>🔗</span> Copiar Link</button>
        <button class="action-btn" id="logout-btn-2" style="color:#ff4d4d;"><span>🚪</span> Sair</button>
      </div>

    </div>
  </main>

  <!-- ═══ MODAL: NOVO EVENTO ═══ -->
  <div class="modal-overlay" id="event-modal">
    <div class="modal-box">
      <h2>🗓️ Novo Evento</h2>
      <form id="event-form">
        <div class="form-group">
          <label>Título *</label>
          <input type="text" id="ev-title" placeholder="Ex: Festival de Jazz" required>
        </div>
        <div class="form-group">
          <label>Descrição</label>
          <textarea id="ev-description" placeholder="Descreva o evento..."></textarea>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
          <div class="form-group">
            <label>Data e Hora *</label>
            <input type="datetime-local" id="ev-date" required>
          </div>
          <div class="form-group">
            <label>Categoria</label>
            <select id="ev-category">
              <option value="show">Show / Música</option>
              <option value="gastronomy">Gastronomia</option>
              <option value="theater">Teatro / Arte</option>
              <option value="sports">Esportes</option>
              <option value="culture">Cultura</option>
              <option value="other">Outro</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label>Local</label>
          <input type="text" id="ev-location" placeholder="Endereço ou nome do local">
        </div>
        <div class="form-group">
          <label>URL da Imagem (opcional)</label>
          <input type="url" id="ev-image" placeholder="https://...">
        </div>
        <div class="modal-actions">
          <button type="button" class="btn-cancel" id="cancel-event-btn">Cancelar</button>
          <button type="submit" class="btn btn-primary" style="color:#000;">Criar Evento</button>
        </div>
      </form>
    </div>
  </div>

  <!-- ═══ MODAL: EDITAR PERFIL ═══ -->
  <div class="modal-overlay" id="edit-modal">
    <div class="modal-box">
      <h2>📝 Editar Perfil</h2>
      <form id="edit-form">
        <div class="form-group">
          <label>Nome da Empresa</label>
          <input type="text" id="edit-name" placeholder="Nome da empresa">
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
          <div class="form-group">
            <label>Telefone</label>
            <input type="text" id="edit-phone" placeholder="(00) 00000-0000">
          </div>
          <div class="form-group">
            <label>Categoria</label>
            <select id="edit-category">
              <option value="restaurant">Restaurante</option>
              <option value="hotel">Hotel / Hospedagem</option>
              <option value="tourism">Turismo / Passeio</option>
              <option value="culture">Cultura / Arte</option>
              <option value="nightlife">Vida Noturna</option>
              <option value="sports">Esportes / Aventura</option>
              <option value="other">Outro</option>
            </select>
          </div>
        </div>
        <div class="form-group">
          <label>Endereço</label>
          <input type="text" id="edit-address" placeholder="Rua, Número, Cidade">
        </div>
        <div class="form-group">
          <label>Website</label>
          <input type="url" id="edit-website" placeholder="https://...">
        </div>
        <div class="form-group">
          <label>Descrição</label>
          <textarea id="edit-description" placeholder="Conte sobre sua empresa..."></textarea>
        </div>
        <div class="modal-actions">
          <button type="button" class="btn-cancel" id="cancel-edit-btn">Cancelar</button>
          <button type="submit" class="btn btn-primary" style="color:#000;">Salvar Alterações</button>
        </div>
      </form>
    </div>
  </div>

  <script src="../assets/js/main.js"></script>
  <script src="../assets/js/company_dashboard.js"></script>
</body>
</html>
