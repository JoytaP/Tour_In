<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Explorar Próximo - Tour.In</title>
  <link rel="stylesheet" href="../assets/css/style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  
  <style>
    /* --- TRAVAMENTO DE LAYOUT EXPLORE --- */
    body, html { height: 100%; margin: 0; overflow: hidden; background: var(--bg-dark); }
    
    .container { 
        height: 100vh; 
        display: flex; 
        flex-direction: column; 
    }

    /* Grid ocupando o espaço total abaixo do header */
    .explore-grid {
      display: grid;
      grid-template-columns: 400px 1fr;
      flex: 1; 
      overflow: hidden;
      position: relative;
    }

    /* PAINEL LATERAL (GLASSMORPHISM) */
    .sidebar-panel {
      background: rgba(255, 255, 255, 0.02);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      display: flex;
      flex-direction: column;
      height: 100%;
      border-right: 1px solid var(--glass-border);
      padding: 25px;
      z-index: 10;
      overflow: hidden;
    }

    /* Títulos e Textos */
    .sidebar-panel h2 { font-weight: 800; letter-spacing: -1px; color: #fff; }
    .text-muted-small { color: var(--text-muted); font-size: 0.85rem; margin-bottom: 20px; }

    /* BARRA DE PESQUISA */
    .search-group {
        display: flex;
        gap: 10px;
        margin-bottom: 15px;
    }
    .search-group .input { flex: 1; background: rgba(255,255,255,0.05); border-radius: 15px; }
    
    .btn-icon {
        width: 45px;
        height: 45px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 15px;
        background: var(--accent-primary);
        color: #000;
        border: none;
        cursor: pointer;
        transition: var(--transition-smooth);
    }
    .btn-icon:hover { transform: scale(1.05); box-shadow: 0 0 15px rgba(0, 242, 255, 0.4); }

    /* ÁREA DE RESULTADOS ROLÁVEL */
    .results-scroll {
      flex: 1;
      overflow-y: auto; 
      margin-top: 10px;
      padding-right: 8px;
      min-height: 0;
    }
    .results-scroll::-webkit-scrollbar { width: 4px; }
    .results-scroll::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 10px; }

    /* FILTROS (CHIPS NEON) */
    .filters { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 20px; }
    .filter-chip {
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid var(--glass-border);
      padding: 8px 14px;
      border-radius: 100px;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-muted);
      cursor: pointer;
      transition: var(--transition-smooth);
    }
    .filter-chip:hover, .filter-chip.active {
      background: var(--accent-primary);
      color: #000;
      border-color: var(--accent-primary);
      box-shadow: 0 0 15px rgba(0, 242, 255, 0.3);
    }

    /* MAPA COM FILTRO DARK */
    .map-wrapper { position: relative; height: 100%; width: 100%; background: #111; }
    #map-interactive { 
        height: 100%; 
        width: 100%; 
        z-index: 1; 
        /* Filtro para deixar o mapa original em modo dark */
        filter: invert(100%) hue-rotate(180deg) brightness(95%) contrast(90%);
    }

    /* Badge de Carregamento Moderno */
    #loading-badge {
        display: none;
        position: absolute;
        top: 30px;
        left: 50%;
        transform: translateX(-50%);
        background: var(--accent-primary);
        color: #000;
        padding: 8px 20px;
        border-radius: 100px;
        font-weight: 800;
        font-size: 0.8rem;
        text-transform: uppercase;
        z-index: 1000;
        box-shadow: 0 10px 20px rgba(0,0,0,0.3);
    }

    /* MOBILE ADJUSTS */
    @media (max-width: 768px) {
      header { width: 95%; top: 10px; }
      .explore-grid { grid-template-columns: 1fr; grid-template-rows: 40% 60%; }
      .sidebar-panel { order: 2; border-right: none; border-top: 1px solid var(--glass-border); border-radius: 30px 30px 0 0; }
      .map-wrapper { order: 1; }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="logo">
        <a href="../index.html"><img src="../assets/img/logo.png" alt="Tour-In"></a>
      </div>
      <ul class="nav-links">
        <li><a href="explore.html" class="active">Explorar</a></li>
        <li><a href="events.html">Eventos</a></li>
        <li><a href="itinerary.html">Roteiros</a></li>
        <li><a href="dashboard.html">Home</a></li>
        <li><a href="#" id="logout-btn" style="color: #ff4d4d;">Sair</a></li>
      </ul>
    </header>

    <div class="explore-grid">
      <aside class="sidebar-panel">
        <div>
          <h2>Explorar</h2>
          <p class="text-muted-small">Encontre os melhores picos da cidade</p>
          
          <div class="search-group">
            <input type="text" id="search-input" class="input" placeholder="O que vamos descobrir?">
            <button class="btn-icon" id="btn-search">🔍</button>
          </div>

          <button id="btn-geo" class="btn" style="width: 100%; background: rgba(255,255,255,0.05); color: #fff; margin-bottom: 20px; border: 1px solid var(--glass-border); border-radius: 15px;">
            📍 Minha Localização
          </button>

          <div class="filters">
            <span class="filter-chip" onclick="searchNearby('restaurante')">🍽️ Comer</span>
            <span class="filter-chip" onclick="searchNearby('bar')">🍻 Noite</span>
            <span class="filter-chip" onclick="searchNearby('turismo')">📸 Fotos</span>
            <span class="filter-chip" onclick="searchNearby('parque')">🌳 Natureza</span>
          </div>
          <div style="height: 1px; background: var(--glass-border); margin-bottom: 20px;"></div>
        </div>

        <div class="results-scroll" id="results-list">
          <div style="text-align: center; color: var(--text-muted); padding-top: 40px;">
            <p style="font-size: 0.9rem;">Busque algo acima ou use os filtros para começar.</p>
          </div>
        </div>
      </aside>

      <div class="map-wrapper">
        <div id="map-interactive"></div>
        <div id="loading-badge">Buscando locais...</div>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="../assets/js/main.js"></script>
  <script src="../assets/js/explore.js"></script>
</body>
</html>
